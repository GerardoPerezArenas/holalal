0/MODULO_INTEGRACION/MELANBIDE33/SEI/PLANTILLA_NORMAL/SEI_ETIQUETA_FECACTES/SQL_ETIQUETA=   select 'Vitoria-Gasteiz, ' || EXTRACT(day FROM sysdate) || ' de ' || \
                                                                                            case extract(month FROM sysdate) \
                                                                                            when 1 then 'Enero' \
                                                                                            when 2 then 'Febrero' \
                                                                                            when 3 then 'Marzo' \
                                                                                            when 4 then 'Abril' \
                                                                                            when 5 then 'Mayo' \
                                                                                            when 6 then 'Junio' \
                                                                                            when 7 then 'Julio' \
                                                                                            when 8 then 'Agosto' \
                                                                                            when 9 then 'Septiembre' \
                                                                                            when 10 then 'Octubre' \
                                                                                            when 11 then 'Noviembre' \
                                                                                            else 'Diciembre' \
                                                                                            end \
                                                                                            || ' de ' || EXTRACT(year FROM sysdate) FECHA \
                                                                                            from dual
