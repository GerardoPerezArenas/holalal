# PROPIEDAD QUE INDICA SI AL MODIFICAR EL DOMICILIO DE UN INTERESADO SE ACTUALIZA TAMBIEN EL DOM EN EL REGISTRO O EXPEDIENTE (SI) O SE MANTIENE EL ANTERIOR (NO)

0/ActualizarDomIntRegistroExpediente = no
1/ActualizarDomIntRegistroExpediente = no


0/limiteResultadosFlexia = 300
1/limiteResultadosFlexia = 300
