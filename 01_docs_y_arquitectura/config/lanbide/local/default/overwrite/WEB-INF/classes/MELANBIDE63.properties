                                                                                                        CASE WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='01' THEN 'urtarrilaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='02' THEN 'otsilaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='03' THEN 'martxoaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='04' THEN 'apirilaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='05' THEN 'maiatzaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='06' THEN 'ekainaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='07' THEN 'uztailaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='08' THEN 'abuztuaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='09' THEN 'irailaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='10' THEN 'urriaren ' \
                                                                                                            WHEN to_char (to_date((select txt_valor from e_txt where txt_cod='FECHAPRESENTACION' and txt_num=a.txt_num ), 'DD-MM-YYYY HH24:MI:SS'),'mm')='11' THEN 'azaroaren ' \
