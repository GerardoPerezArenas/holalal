et_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO5'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSAPARTADO7'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO7'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSAPARTADO8'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO8'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra