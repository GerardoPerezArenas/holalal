et_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO5'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSAPARTADO7'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO7'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSAPARTADO8'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO8'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSAPARTADO9'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO9'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSAPARTADO10'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO10'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSAPARTADO11'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='APARTADO11'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSRELPERSPROP'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='RELPERSPROP'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSINFTECACC'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='INFTECNACC'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSDECPERDISC'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='DECLPERDISCAP'         AND tdet_num=EXP_NUM       ) AS observaciones     FROM       E_EXP     LEFT JOIN E_EXT     ON       (         EXT_PRO  =EXP_PRO       AND EXT_NUm=EXP_NUM       AND ext_rol=1       )     LEFT JOIN T_HTE     ON       (         ext_ter  =hte_ter       AND ext_nvr=hte_nvr       )     INNER JOIN E_CRO     ON       (         cro_pro  = EXP_PRO       AND cro_tra=32       AND cro_num=exp_num       )     WHERE       exp_eje  =2017     AND EXP_PRO='CEMP'     ORDER BY       exp_num   )
