        SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSIMP3'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='IMPRESO3'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSIMP4'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='IMPRESO4'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSIMP5'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='IMPRESO5'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSIMP6'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='IMPRESO6'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSCOPCIFNIF'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='COPCIF'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSMEMACTIORI'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='MEMOACTORI'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSMEMETEC'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='MEMOMETEC'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSRELPERS'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='RELACPERSON'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(txtt_valor)                 FROM                   e_txtt                 WHERE                   txtt_eje  =exp_eje                 AND txtt_PRO=EXP_PRO                 AND txtt_tra=cro_tra                 AND txtt_cod='OBSINFEMPLOC'                 AND txtt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='INFEMPLA'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSCERTSPE'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='CERTSPE'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSINFACC'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='INFACC'         AND tdet_num=EXP_NUM       )       ||       (         SELECT           CASE             WHEN tdet_valor = 'X'             THEN REPLACE( REPLACE(               (                 SELECT                   '**'                   || trim(ttlt_valor)                 FROM                   e_ttlt                 WHERE                   ttlt_eje  =exp_eje                 AND ttlt_PRO=EXP_PRO                 AND ttlt_tra=cro_tra                 AND ttlt_cod='OBSTRAYDEM'                 AND ttlt_num=EXP_NUM               )               , CHR(10), ''),CHR(13), '*')           END         FROM           e_tdet         WHERE           tdet_eje  =exp_eje         AND tdet_PRO=EXP_PRO         AND tdet_tra=cro_tra         AND tdet_cod='TRAYDEM'         AND tdet_num=EXP_NUM       ) AS observaciones     FROM       E_EXP     LEFT JOIN E_EXT     ON       (         EXT_PRO  =EXP_PRO       AND EXT_NUm=EXP_NUM       AND ext_rol=1       )     LEFT JOIN T_HTE     ON       (         ext_ter  =hte_ter       AND ext_nvr=hte_nvr       )     INNER JOIN E_CRO     ON       (         cro_pro  = EXP_PRO       AND cro_tra=32       AND cro_num=exp_num       )     WHERE       exp_eje  =2017     AND EXP_PRO='ORI14'     ORDER BY       exp_num   )
