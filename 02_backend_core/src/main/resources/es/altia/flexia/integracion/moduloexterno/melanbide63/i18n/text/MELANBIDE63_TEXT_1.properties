## CODIGOS RESULTADO OPERACION CARGA MASIVA
resultado.codigo.-1=Error general el proceso. Compruebe los logs para mas informacion.
resultado.codigo.0=Proceso sobre documentos Realizado Correctamente.
resultado.codigo.1=Proceso Cancelado. Error al recuperar el Adaptador de BBDD.
resultado.codigo.2=Proceso Cancelado. No se ha podido recuperar la URL donde estan ubicados los documentos a cargar.
resultado.codigo.3=Proceso Cancelado. La URL recibida no existe o no es un directorio valido.
resultado.codigo.4=Proceso Cancelado. Error al procesar los documentos de carga o en la escritura del fichero log del proceso. \n <br /> Compruebe la URL indicada o la existente en el fichero properties.  Consulte el log de la aplicacion para mas detalles.
resultado.codigo.5=Proceso Cancelado. Codigo de procedimiento NO VALIDO o Procedimiento no Existe.
resultado.codigo.6=Proceso Cancelado. Codigo Interno de Tr\u00e1mite NO VALIDO o no Existe ese codigo para dicho procedimiento.
resultado.codigo.7=Proceso Cancelado. Codigo Plantilla indicado NO VALIDO o no Existe ese para dicho procedimiento y tr\u00e1mite.