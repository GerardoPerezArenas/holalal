####################### M\u00c9TODOS QUE OBLIGATORIAMENTE TIENEN QUE DEVOLVER DATOS A LA HORA DE GRABAR UN CAMPO SUPLEMENTARIO A NIVEL DE EXPEDIENTE ######################
